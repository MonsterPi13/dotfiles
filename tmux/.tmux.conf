# ─── 基础设置 ──────────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 10000
set -g base-index 1            # 窗口从 1 开始编号
set -g pane-base-index 1       # 窗格从 1 开始编号
set -g renumber-windows on     # 关闭窗口后自动重新编号
set -sg escape-time 0          # 消除 Neovim 中的 ESC 延迟

# ─── 前缀键改为 Ctrl+a ─────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── 鼠标支持 ──────────────────────────────────────────────────────────────────
set -g mouse on

# ─── 分屏快捷键（直觉化）──────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"   # 左右分屏
bind - split-window -v -c "#{pane_current_path}"   # 上下分屏
unbind '"'
unbind %

# ─── 窗格导航（Alt + 方向键，无需前缀）────────────────────────────────────────
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ─── 窗口切换 ──────────────────────────────────────────────────────────────────
bind -n S-Left  previous-window
bind -n S-Right next-window

# ─── 配置重载 ──────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "配置已重载"

# ─── 状态栏 ────────────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-left " #S "
set -g status-right " %Y-%m-%d %H:%M "
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g window-status-current-style "bg=#89b4fa,fg=#1e1e2e,bold"
